[pytest]

addopts =
    -ra
    --last-failed
    --cov=api
    --cov-report=html
    --cov-report=term-missing:skip-covered
    --no-cov-on-fail

filterwarnings =
    ignore:The '__version__' attribute is deprecated:DeprecationWarning:webargs.compat
    ignore:distutils Version classes are deprecated:DeprecationWarning:webargs
    ignore:ast\.Str is deprecated:DeprecationWarning
    ignore:Attribute s is deprecated:DeprecationWarning

cache_dir = .cache
